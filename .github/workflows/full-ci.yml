name: Full CI

on:
  workflow_dispatch:
  schedule:
    # Nightly runs validate staging (the development branch); see the checkout ref.
    # The heavy suites below no longer run on every staging push — this nightly
    # plus the release gate is their guaranteed cadence.
    - cron: "17 8 * * *"
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: full-ci-${{ github.event_name == 'schedule' && 'staging' || github.ref }}
  cancel-in-progress: true

jobs:
  full-web-visual:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64, hostlet-core]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
        with:
          # Scheduled runs validate staging, not the default branch.
          ref: ${{ github.event_name == 'schedule' && 'staging' || '' }}
      - run: ../../scripts/ci-verify-runner.sh
      - run: node --version && pnpm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec playwright install chromium
      - run: pnpm test:web
      - run: pnpm responsive:qa
        env:
          HOSTLET_RESPONSIVE_QA_DIR: /tmp/hostlet-responsive-qa-${{ github.run_id }}-${{ github.job }}
      - run: ../../scripts/ci-security-artifact-smoke.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: responsive-qa-screenshots
          path: /tmp/hostlet-responsive-qa-${{ github.run_id }}-${{ github.job }}

  full-self-hosted-deploy:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64, hostlet-core]
    steps:
      - uses: actions/checkout@v4
        with:
          # Scheduled runs validate staging, not the default branch.
          ref: ${{ github.event_name == 'schedule' && 'staging' || '' }}
      - run: scripts/ci-verify-runner.sh
      - run: scripts/ci-install-railpack.sh
      - run: test -x "${HOSTLET_RAILPACK_BIN}"
      - name: Use runner's cached rustup
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/ci-self-hosted-deploy-e2e.sh

  full-compose-and-release:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64, hostlet-core]
    env:
      # Cap cargo parallelism (release build is the most expensive cargo
      # invocation in CI; see 2026-06-10 runner-VM crash-loop incident).
      CARGO_BUILD_JOBS: "2"
      POSTGRES_PASSWORD: ci-only-not-a-secret-postgres
      PUBLIC_API_URL: http://localhost:8080
      PUBLIC_WEB_URL: http://localhost:3000
      HOSTLET_SETUP_TOKEN: ci-only-not-a-secret-setup-token-01
      HOSTLET_ALLOWED_GITHUB_LOGINS: ci-user
      ENCRYPTION_KEY: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
      JOB_SIGNING_SECRET: ci-only-not-a-secret-job-signing-01
      SESSION_SECRET: ci-only-not-a-secret-session-secret-01
      LOCAL_AGENT_TOKEN: ci-only-not-a-secret-agent-token-01
      GITHUB_WEBHOOK_SECRET: ci-only-not-a-secret-webhook-secret-01
      HOSTLET_IMAGE_TAG: v0.5.0
      HOSTLET_API_IMAGE: ghcr.io/shanekanterman04/hostlet-api@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      HOSTLET_WEB_IMAGE: ghcr.io/shanekanterman04/hostlet-web@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      HOSTLET_AGENT_IMAGE: ghcr.io/shanekanterman04/hostlet-agent@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      HOSTLET_SCREENSHOTTER_IMAGE: ghcr.io/shanekanterman04/hostlet-screenshotter@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      DOCKER_GID: "998"
    steps:
      - uses: actions/checkout@v4
        with:
          # Scheduled runs validate staging, not the default branch.
          ref: ${{ github.event_name == 'schedule' && 'staging' || '' }}
      - run: scripts/ci-verify-runner.sh
      - name: Use runner's cached rustup
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: dtolnay/rust-toolchain@stable
      - run: docker compose -f infra/docker-compose.yml config >/dev/null
      - run: docker compose -f infra/docker-compose.prod.yml config >/dev/null
      - run: HOSTLET_CADDYFILE=./Caddyfile.direct docker compose -f infra/docker-compose.prod.yml config >/dev/null
      - run: cargo test -p hostlet-agent compose -- --nocapture
      - run: cargo test -p hostlet-api compose -- --nocapture
      - run: cargo build --release -p hostlet
      - run: |
          mkdir -p dist
          cp target/release/hostlet dist/hostlet-linux-x64
          sha256sum dist/hostlet-linux-x64 > dist/hostlet-linux-x64.sha256
          scripts/ci-security-artifact-smoke.sh
