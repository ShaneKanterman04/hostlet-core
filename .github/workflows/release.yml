name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  # Release gate: the heavy integration suites no longer run on every staging
  # push, so they run here against the exact commit being released. linux-cli
  # (which builds + publishes the release images) needs this to pass first.
  # Runs on both tag push and workflow_dispatch so a release can be dry-run-validated.
  release-validation:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64, hostlet-core]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: scripts/ci-verify-runner.sh
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - run: scripts/ci-self-hosted-api-smoke.sh
      - run: scripts/ci-install-railpack.sh
      - run: test -x "${HOSTLET_RAILPACK_BIN}"
      - run: scripts/ci-railpack-generated-fixtures.sh
      - run: scripts/ci-self-hosted-deploy-e2e.sh

  linux-cli:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs: [release-validation]
    runs-on: [self-hosted, Linux, X64, hostlet-core]
    env:
      # Cap cargo parallelism (release build is the most expensive cargo
      # invocation in CI; see 2026-06-10 runner-VM crash-loop incident).
      CARGO_BUILD_JOBS: "2"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: scripts/ci-verify-runner.sh
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - run: cargo build --release -p hostlet
      - name: Build ARM64 CLI
        run: |
          cargo install cross --version 0.2.5 --locked
          cross build --release -p hostlet --target aarch64-unknown-linux-gnu
      - run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            for manifest in apps/cli/Cargo.toml apps/api/Cargo.toml apps/agent/Cargo.toml; do
              grep -q "^version = \"${VERSION}\"$" "$manifest" || {
                echo "$manifest version does not match tag ${GITHUB_REF_NAME}" >&2
                exit 1
              }
            done
          fi
      - name: Compute image tags
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "SHA_TAG=sha-${GITHUB_SHA::12}" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push release images
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          IMAGE_REGISTRY: ghcr.io/shanekanterman04
        run: |
          scripts/ci-docker-retry.sh docker buildx build --platform linux/amd64,linux/arm64 --push \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            --label org.opencontainers.image.source="https://github.com/${GITHUB_REPOSITORY}" \
            --label org.opencontainers.image.version="${RELEASE_TAG}" \
            -f apps/api/Dockerfile \
            -t "${IMAGE_REGISTRY}/hostlet-api:${RELEASE_TAG}" \
            -t "${IMAGE_REGISTRY}/hostlet-api:${SHA_TAG}" \
            .
          scripts/ci-docker-retry.sh docker buildx build --platform linux/amd64,linux/arm64 --push \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            --label org.opencontainers.image.source="https://github.com/${GITHUB_REPOSITORY}" \
            --label org.opencontainers.image.version="${RELEASE_TAG}" \
            -f apps/web/Dockerfile \
            -t "${IMAGE_REGISTRY}/hostlet-web:${RELEASE_TAG}" \
            -t "${IMAGE_REGISTRY}/hostlet-web:${SHA_TAG}" \
            .
          scripts/ci-docker-retry.sh docker buildx build --platform linux/amd64,linux/arm64 --push \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            --label org.opencontainers.image.source="https://github.com/${GITHUB_REPOSITORY}" \
            --label org.opencontainers.image.version="${RELEASE_TAG}" \
            -f apps/agent/Dockerfile \
            -t "${IMAGE_REGISTRY}/hostlet-agent:${RELEASE_TAG}" \
            -t "${IMAGE_REGISTRY}/hostlet-agent:${SHA_TAG}" \
            .
          scripts/ci-docker-retry.sh docker buildx build --platform linux/amd64,linux/arm64 --push \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            --label org.opencontainers.image.source="https://github.com/${GITHUB_REPOSITORY}" \
            --label org.opencontainers.image.version="${RELEASE_TAG}" \
            -f apps/screenshotter/Dockerfile \
            -t "${IMAGE_REGISTRY}/hostlet-screenshotter:${RELEASE_TAG}" \
            -t "${IMAGE_REGISTRY}/hostlet-screenshotter:${SHA_TAG}" \
            .
          HOSTLET_SCREENSHOTTER_TEST_IMAGE="${IMAGE_REGISTRY}/hostlet-screenshotter:${SHA_TAG}" \
          HOSTLET_SCREENSHOTTER_SKIP_BUILD=1 \
            scripts/ci-screenshotter-smoke.sh
      - name: Capture release image digests
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          IMAGE_REGISTRY: ghcr.io/shanekanterman04
        run: |
          for image in hostlet-api hostlet-web hostlet-agent hostlet-screenshotter; do
            digest="$(docker buildx imagetools inspect --format '{{.Manifest.Digest}}' "${IMAGE_REGISTRY}/${image}:${RELEASE_TAG}")"
            if [[ ! "${digest}" =~ ^sha256:[a-f0-9]{64}$ ]]; then
              echo "failed to capture registry digest for ${IMAGE_REGISTRY}/${image}:${RELEASE_TAG}: ${digest}" >&2
              exit 1
            fi
            key="$(printf '%s' "${image}" | tr '[:lower:]-' '[:upper:]_')"
            echo "${key}_DIGEST=${digest}" >> "$GITHUB_ENV"
          done
      - run: |
          mkdir -p dist
          cp target/release/hostlet dist/hostlet-linux-x64
          cp target/aarch64-unknown-linux-gnu/release/hostlet dist/hostlet-linux-arm64
          chmod +x dist/hostlet-linux-x64 dist/hostlet-linux-arm64
          cd dist
          sha256sum hostlet-linux-x64 > hostlet-linux-x64.sha256
          sha256sum hostlet-linux-arm64 > hostlet-linux-arm64.sha256
          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE_TAG="${GITHUB_REF_NAME}"
          CHECKSUM="$(cut -d ' ' -f 1 hostlet-linux-x64.sha256)"
          ARM64_CHECKSUM="$(cut -d ' ' -f 1 hostlet-linux-arm64.sha256)"
          RELEASED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > hostlet-release.json <<EOF
          {
            "version": "${VERSION}",
            "released_at": "${RELEASED_AT}",
            "minimum_supported_version": "0.1.0",
            "image_registry": "ghcr.io/shanekanterman04",
            "image_tag": "${IMAGE_TAG}",
            "images": {
              "api": {
                "ref": "ghcr.io/shanekanterman04/hostlet-api@${HOSTLET_API_DIGEST:-}",
                "digest": "${HOSTLET_API_DIGEST:-}"
              },
              "web": {
                "ref": "ghcr.io/shanekanterman04/hostlet-web@${HOSTLET_WEB_DIGEST:-}",
                "digest": "${HOSTLET_WEB_DIGEST:-}"
              },
              "agent": {
                "ref": "ghcr.io/shanekanterman04/hostlet-agent@${HOSTLET_AGENT_DIGEST:-}",
                "digest": "${HOSTLET_AGENT_DIGEST:-}"
              },
              "screenshotter": {
                "ref": "ghcr.io/shanekanterman04/hostlet-screenshotter@${HOSTLET_SCREENSHOTTER_DIGEST:-}",
                "digest": "${HOSTLET_SCREENSHOTTER_DIGEST:-}"
              }
            },
            "assets": {
              "hostlet-linux-x64": {
                "sha256": "${CHECKSUM}"
              },
              "hostlet-linux-arm64": {
                "sha256": "${ARM64_CHECKSUM}"
              }
            },
            "compose_migrations": true,
            "database_migrations": true,
            "notes_url": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          }
          EOF
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            node -e '
              const fs = require("fs");
              const manifest = JSON.parse(fs.readFileSync("hostlet-release.json", "utf8"));
              for (const [name, image] of Object.entries(manifest.images)) {
                if (!/^sha256:[a-f0-9]{64}$/.test(image.digest || "")) {
                  throw new Error(`missing valid digest for ${name}`);
                }
              }
            '
          fi
      - name: Sign checksum
        if: env.HOSTLET_RELEASE_GPG_PRIVATE_KEY != ''
        env:
          HOSTLET_RELEASE_GPG_PRIVATE_KEY: ${{ secrets.HOSTLET_RELEASE_GPG_PRIVATE_KEY }}
          HOSTLET_RELEASE_GPG_PASSPHRASE: ${{ secrets.HOSTLET_RELEASE_GPG_PASSPHRASE }}
        run: |
          install -m 700 -d ~/.gnupg
          printf '%s' "$HOSTLET_RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import
          for checksum in dist/hostlet-linux-x64.sha256 dist/hostlet-linux-arm64.sha256; do
            gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$HOSTLET_RELEASE_GPG_PASSPHRASE" \
              --armor --detach-sign "$checksum"
          done
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          file: dist/hostlet-linux-x64
          format: spdx-json
          output-file: dist/hostlet-linux-x64.spdx.json
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: |
            dist/hostlet-linux-x64
            dist/hostlet-linux-x64.sha256
            dist/hostlet-linux-arm64
            dist/hostlet-linux-arm64.sha256
            dist/hostlet-release.json
            dist/hostlet-linux-x64.spdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hostlet-linux-x64
          path: |
            dist/hostlet-linux-x64
            dist/hostlet-linux-x64.sha256
            dist/hostlet-linux-x64.sha256.asc*
            dist/hostlet-linux-arm64
            dist/hostlet-linux-arm64.sha256
            dist/hostlet-linux-arm64.sha256.asc*
            dist/hostlet-release.json
            dist/hostlet-linux-x64.spdx.json
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/hostlet-linux-x64
            dist/hostlet-linux-x64.sha256
            dist/hostlet-linux-x64.sha256.asc*
            dist/hostlet-linux-arm64
            dist/hostlet-linux-arm64.sha256
            dist/hostlet-linux-arm64.sha256.asc*
            dist/hostlet-release.json
            dist/hostlet-linux-x64.spdx.json
