name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-cli:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p hostlet
      - run: |
          mkdir -p dist
          cp target/release/hostlet dist/hostlet-linux-x64
          chmod +x dist/hostlet-linux-x64
          cd dist
          sha256sum hostlet-linux-x64 > hostlet-linux-x64.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: hostlet-linux-x64
          path: |
            dist/hostlet-linux-x64
            dist/hostlet-linux-x64.sha256
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/hostlet-linux-x64
            dist/hostlet-linux-x64.sha256
