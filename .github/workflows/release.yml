name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  linux-cli:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          mkdir -p "$RUNNER_TEMP/bin"
          ln -sf /usr/bin/unzip "$RUNNER_TEMP/bin/unzip"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - run: cargo build --release -p hostlet
      - run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            for manifest in apps/cli/Cargo.toml apps/api/Cargo.toml apps/agent/Cargo.toml; do
              grep -q "^version = \"${VERSION}\"$" "$manifest" || {
                echo "$manifest version does not match tag ${GITHUB_REF_NAME}" >&2
                exit 1
              }
            done
          fi
      - name: Compute image tags
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "SHA_TAG=sha-${GITHUB_SHA::12}" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push release images
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          IMAGE_REGISTRY: ghcr.io/shanekanterman04
        run: |
          docker build \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            --label org.opencontainers.image.source="https://github.com/${GITHUB_REPOSITORY}" \
            --label org.opencontainers.image.version="${RELEASE_TAG}" \
            -f apps/api/Dockerfile \
            -t "${IMAGE_REGISTRY}/hostlet-api:${RELEASE_TAG}" \
            -t "${IMAGE_REGISTRY}/hostlet-api:${SHA_TAG}" \
            .
          docker build \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            --label org.opencontainers.image.source="https://github.com/${GITHUB_REPOSITORY}" \
            --label org.opencontainers.image.version="${RELEASE_TAG}" \
            -f apps/web/Dockerfile \
            -t "${IMAGE_REGISTRY}/hostlet-web:${RELEASE_TAG}" \
            -t "${IMAGE_REGISTRY}/hostlet-web:${SHA_TAG}" \
            .
          docker build \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            --label org.opencontainers.image.source="https://github.com/${GITHUB_REPOSITORY}" \
            --label org.opencontainers.image.version="${RELEASE_TAG}" \
            -f apps/agent/Dockerfile \
            -t "${IMAGE_REGISTRY}/hostlet-agent:${RELEASE_TAG}" \
            -t "${IMAGE_REGISTRY}/hostlet-agent:${SHA_TAG}" \
            .
          for image in hostlet-api hostlet-web hostlet-agent; do
            docker push "${IMAGE_REGISTRY}/${image}:${RELEASE_TAG}"
            docker push "${IMAGE_REGISTRY}/${image}:${SHA_TAG}"
          done
      - name: Capture release image digests
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          IMAGE_REGISTRY: ghcr.io/shanekanterman04
        run: |
          for image in hostlet-api hostlet-web hostlet-agent; do
            digest="$(docker buildx imagetools inspect "${IMAGE_REGISTRY}/${image}:${RELEASE_TAG}" --format '{{.Manifest.Digest}}')"
            if [[ ! "${digest}" =~ ^sha256:[a-f0-9]{64}$ ]]; then
              echo "failed to capture registry digest for ${IMAGE_REGISTRY}/${image}:${RELEASE_TAG}: ${digest}" >&2
              exit 1
            fi
            key="$(printf '%s' "${image}" | tr '[:lower:]-' '[:upper:]_')"
            echo "${key}_DIGEST=${digest}" >> "$GITHUB_ENV"
          done
      - run: |
          mkdir -p dist
          cp target/release/hostlet dist/hostlet-linux-x64
          chmod +x dist/hostlet-linux-x64
          cd dist
          sha256sum hostlet-linux-x64 > hostlet-linux-x64.sha256
          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE_TAG="${GITHUB_REF_NAME}"
          CHECKSUM="$(cut -d ' ' -f 1 hostlet-linux-x64.sha256)"
          RELEASED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > hostlet-release.json <<EOF
          {
            "version": "${VERSION}",
            "released_at": "${RELEASED_AT}",
            "minimum_supported_version": "0.1.0",
            "image_registry": "ghcr.io/shanekanterman04",
            "image_tag": "${IMAGE_TAG}",
            "images": {
              "api": {
                "ref": "ghcr.io/shanekanterman04/hostlet-api:${IMAGE_TAG}",
                "digest": "${HOSTLET_API_DIGEST:-}"
              },
              "web": {
                "ref": "ghcr.io/shanekanterman04/hostlet-web:${IMAGE_TAG}",
                "digest": "${HOSTLET_WEB_DIGEST:-}"
              },
              "agent": {
                "ref": "ghcr.io/shanekanterman04/hostlet-agent:${IMAGE_TAG}",
                "digest": "${HOSTLET_AGENT_DIGEST:-}"
              }
            },
            "assets": {
              "hostlet-linux-x64": {
                "sha256": "${CHECKSUM}"
              }
            },
            "compose_migrations": true,
            "database_migrations": true,
            "notes_url": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          }
          EOF
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            node -e '
              const fs = require("fs");
              const manifest = JSON.parse(fs.readFileSync("hostlet-release.json", "utf8"));
              for (const [name, image] of Object.entries(manifest.images)) {
                if (!/^sha256:[a-f0-9]{64}$/.test(image.digest || "")) {
                  throw new Error(`missing valid digest for ${name}`);
                }
              }
            '
          fi
      - name: Sign checksum
        if: env.HOSTLET_RELEASE_GPG_PRIVATE_KEY != ''
        env:
          HOSTLET_RELEASE_GPG_PRIVATE_KEY: ${{ secrets.HOSTLET_RELEASE_GPG_PRIVATE_KEY }}
          HOSTLET_RELEASE_GPG_PASSPHRASE: ${{ secrets.HOSTLET_RELEASE_GPG_PASSPHRASE }}
        run: |
          install -m 700 -d ~/.gnupg
          printf '%s' "$HOSTLET_RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$HOSTLET_RELEASE_GPG_PASSPHRASE" \
            --armor --detach-sign dist/hostlet-linux-x64.sha256
      - uses: anchore/sbom-action@v0
        with:
          file: dist/hostlet-linux-x64
          format: spdx-json
          output-file: dist/hostlet-linux-x64.spdx.json
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/hostlet-linux-x64
            dist/hostlet-linux-x64.sha256
            dist/hostlet-release.json
            dist/hostlet-linux-x64.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: hostlet-linux-x64
          path: |
            dist/hostlet-linux-x64
            dist/hostlet-linux-x64.sha256
            dist/hostlet-linux-x64.sha256.asc*
            dist/hostlet-release.json
            dist/hostlet-linux-x64.spdx.json
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/hostlet-linux-x64
            dist/hostlet-linux-x64.sha256
            dist/hostlet-linux-x64.sha256.asc*
            dist/hostlet-release.json
            dist/hostlet-linux-x64.spdx.json
