name: Deployability CI

on:
  push:
    branches:
      - main
  schedule:
    # Nightly safety net for these heavy suites against staging — they no longer
    # run on every staging push. Pairs with the release gate (see release.yml).
    - cron: "30 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deployability-${{ github.event_name == 'schedule' && 'staging' || github.ref }}
  cancel-in-progress: true

jobs:
  generated-apps:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64, hostlet-core]
    steps:
      - uses: actions/checkout@v4
        with:
          # Scheduled runs validate staging, not the default branch.
          ref: ${{ github.event_name == 'schedule' && 'staging' || '' }}
      - run: scripts/ci-install-railpack.sh
      - run: test -x "${HOSTLET_RAILPACK_BIN}"
      - run: scripts/ci-railpack-generated-fixtures.sh
        env:
          HOSTLET_RAILPACK_METRICS_FILE: ${{ github.workspace }}/reports/railpack-generated-fixtures-metrics.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: railpack-generated-fixtures-metrics
          path: reports/railpack-generated-fixtures-metrics.json
          if-no-files-found: warn
          retention-days: 14

  self-hosted-api:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64, hostlet-core]
    steps:
      - uses: actions/checkout@v4
        with:
          # Scheduled runs validate staging, not the default branch.
          ref: ${{ github.event_name == 'schedule' && 'staging' || '' }}
      - name: Use runner's cached rustup
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/ci-self-hosted-api-smoke.sh
