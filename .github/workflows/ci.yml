name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace

  web:
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  compose:
    runs-on: [self-hosted, Linux, X64]
    env:
      POSTGRES_PASSWORD: ci-postgres-password
      PUBLIC_API_URL: http://localhost:8080
      PUBLIC_WEB_URL: http://localhost:3000
      HOSTLET_SETUP_TOKEN: ci-setup-token-ci-setup-token-ci-setup
      HOSTLET_ALLOWED_GITHUB_LOGINS: ci-user
      ENCRYPTION_KEY: BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc=
      JOB_SIGNING_SECRET: ci-job-signing-secret-ci-job-signing-secret
      SESSION_SECRET: ci-session-secret-ci-session-secret-ci
      LOCAL_AGENT_TOKEN: ci-local-agent-token-ci-local-agent-token
      GITHUB_WEBHOOK_SECRET: ci-webhook-secret-ci-webhook-secret
      CLOUDFLARE_TUNNEL_TOKEN: ci-tunnel-token
      DOCKER_GID: "998"
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f infra/docker-compose.yml config >/dev/null
      - run: docker compose -f infra/docker-compose.prod.yml config >/dev/null

  docker:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f apps/web/Dockerfile -t hostlet-web-ci .
      - run: docker build -f apps/api/Dockerfile -t hostlet-api-ci .
      - run: docker build -f apps/agent/Dockerfile -t hostlet-agent-ci .
