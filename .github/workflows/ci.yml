name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.30.1 detect --source=/repo --redact --verbose

  rust:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace

  web:
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: ../../scripts/ci-web-route-smoke.sh
      - run: pnpm exec playwright install chromium
      - run: pnpm test:web
      - run: pnpm responsive:qa
      - run: ../../scripts/ci-security-artifact-smoke.sh

  compose:
    runs-on: [self-hosted, Linux, X64]
    env:
      POSTGRES_PASSWORD: ci-only-not-a-secret-postgres
      PUBLIC_API_URL: http://localhost:8080
      PUBLIC_WEB_URL: http://localhost:3000
      HOSTLET_SETUP_TOKEN: ci-only-not-a-secret-setup-token-01
      HOSTLET_ALLOWED_GITHUB_LOGINS: ci-user
      ENCRYPTION_KEY: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
      JOB_SIGNING_SECRET: ci-only-not-a-secret-job-signing-01
      SESSION_SECRET: ci-only-not-a-secret-session-secret-01
      LOCAL_AGENT_TOKEN: ci-only-not-a-secret-agent-token-01
      GITHUB_WEBHOOK_SECRET: ci-only-not-a-secret-webhook-secret-01
      CLOUDFLARE_TUNNEL_TOKEN: ci-only-not-a-secret-tunnel-token-01
      HOSTLET_IMAGE_TAG: v0.4.0
      DOCKER_GID: "998"
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f infra/docker-compose.yml config >/dev/null
      - run: docker compose -f infra/docker-compose.prod.yml config >/dev/null
      - name: Validate cloud production compose
        env:
          HOSTLET_MODE: cloud
          PUBLIC_API_URL: https://hostlet.cloud
          PUBLIC_WEB_URL: https://hostlet.cloud
          PUBLIC_WEBHOOK_URL: https://hostlet.cloud
          HOSTLET_ALLOWED_WEB_ORIGINS: https://hostlet.cloud
          HOSTLET_BASE_DOMAIN: hostlet.cloud
          HOSTLET_CADDYFILE: ./Caddyfile.direct
          GITHUB_APP_ID: "1"
          GITHUB_APP_SLUG: hostlet-ci
          GITHUB_APP_CLIENT_ID: ci-client-id
          GITHUB_APP_CLIENT_SECRET: ci-only-not-a-secret-github-app-client
          GITHUB_APP_PRIVATE_KEY_PEM: ci-only-not-a-secret-private-key
          GITHUB_APP_WEBHOOK_SECRET: ci-only-not-a-secret-github-app-webhook
          STRIPE_SECRET_KEY: sk_test_ci_only_not_a_secret
          STRIPE_PUBLISHABLE_KEY: pk_test_ci_only_not_a_secret
          STRIPE_WEBHOOK_SECRET: whsec_ci_only_not_a_secret
          STRIPE_PRICE_STUDENT: price_ci_student
          STRIPE_PRICE_STARTER: price_ci_starter
          STRIPE_PRICE_PRO: price_ci_pro
        run: docker compose -f infra/docker-compose.prod.yml config >/dev/null

  cloud-api-smoke:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: scripts/ci-cloud-api-smoke.sh

  docker:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f apps/web/Dockerfile -t hostlet-web-ci .
      - run: docker build -f apps/api/Dockerfile -t hostlet-api-ci .
      - run: docker build -f apps/agent/Dockerfile -t hostlet-agent-ci .
