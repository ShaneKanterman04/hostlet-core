name: PR Homelab CI

on:
  pull_request_target:
    types:
      - labeled
      - synchronize
      - reopened

permissions:
  contents: read

env:
  HOSTLET_ALLOWED_RUNNER_NAMES: hostlet-core-homelab-2,hostlet-core-homelab-3

concurrency:
  group: pr-homelab-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  clear-approval:
    if: github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'homelab-ci-approved')
    runs-on: [self-hosted, Linux, X64, hostlet-core]
    permissions:
      pull-requests: write
    steps:
      - name: Remove stale homelab CI approval
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.pull_request.number }}
        run: |
          curl -fsS -X DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE}/labels/homelab-ci-approved"

  secrets:
    if: github.event.action == 'labeled' && github.event.label.name == 'homelab-ci-approved'
    runs-on: [self-hosted, Linux, X64, hostlet-core]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 0
      - run: scripts/ci-verify-runner.sh
      - run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f detect --source=/repo --redact --verbose

  rust:
    if: github.event.action == 'labeled' && github.event.label.name == 'homelab-ci-approved'
    runs-on: [self-hosted, Linux, X64, hostlet-core]
    env:
      CARGO_BUILD_JOBS: "2"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - run: scripts/ci-verify-runner.sh
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - run: scripts/check-line-cap.sh
      - run: scripts/check-line-cap-selftest.sh
      - run: scripts/check-migration-versions.sh
      - run: scripts/ci-core-workflow-contracts.sh
      - run: scripts/ci-verify-runner-selftest.sh
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace

  web:
    if: github.event.action == 'labeled' && github.event.label.name == 'homelab-ci-approved'
    runs-on: [self-hosted, Linux, X64, hostlet-core]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - run: ../../scripts/ci-verify-runner.sh
      - run: node --version && pnpm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: ../../scripts/ci-web-route-smoke.sh
      - run: pnpm exec playwright install chromium
      - run: pnpm test:web
      - run: pnpm responsive:qa
      - run: ../../scripts/ci-security-artifact-smoke.sh

  compose:
    if: github.event.action == 'labeled' && github.event.label.name == 'homelab-ci-approved'
    runs-on: [self-hosted, Linux, X64, hostlet-core]
    env:
      POSTGRES_PASSWORD: ci-only-not-a-secret-postgres
      PUBLIC_API_URL: http://localhost:8080
      PUBLIC_WEB_URL: http://localhost:3000
      HOSTLET_SETUP_TOKEN: ci-only-not-a-secret-setup-token-01
      HOSTLET_ALLOWED_GITHUB_LOGINS: ci-user
      ENCRYPTION_KEY: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
      JOB_SIGNING_SECRET: ci-only-not-a-secret-job-signing-01
      SESSION_SECRET: ci-only-not-a-secret-session-secret-01
      LOCAL_AGENT_TOKEN: ci-only-not-a-secret-agent-token-01
      GITHUB_WEBHOOK_SECRET: ci-only-not-a-secret-webhook-secret-01
      HOSTLET_IMAGE_TAG: v0.5.0
      HOSTLET_API_IMAGE: ghcr.io/shanekanterman04/hostlet-api@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      HOSTLET_WEB_IMAGE: ghcr.io/shanekanterman04/hostlet-web@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      HOSTLET_AGENT_IMAGE: ghcr.io/shanekanterman04/hostlet-agent@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      HOSTLET_SCREENSHOTTER_IMAGE: ghcr.io/shanekanterman04/hostlet-screenshotter@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      DOCKER_GID: "998"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - run: scripts/ci-verify-runner.sh
      - run: docker compose -f infra/docker-compose.yml config >/dev/null
      - run: docker compose -f infra/docker-compose.prod.yml config >/dev/null

  docker:
    if: github.event.action == 'labeled' && github.event.label.name == 'homelab-ci-approved'
    runs-on: [self-hosted, Linux, X64, hostlet-core]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - run: scripts/ci-verify-runner.sh
      - run: scripts/ci-docker-retry.sh docker build -f apps/web/Dockerfile -t hostlet-web-ci .
      - run: scripts/ci-docker-retry.sh docker build -f apps/api/Dockerfile -t hostlet-api-ci .
      - run: scripts/ci-docker-retry.sh docker build -f apps/agent/Dockerfile -t hostlet-agent-ci .
      - run: scripts/ci-screenshotter-smoke.sh
