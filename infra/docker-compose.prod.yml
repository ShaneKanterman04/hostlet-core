services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hostlet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hostlet}
    volumes:
      - hostlet-postgres:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hostlet}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hostlet}
      BIND_ADDR: 0.0.0.0:8080
      PUBLIC_API_URL: ${PUBLIC_API_URL}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL}
      HOSTLET_REPO_URL: ${HOSTLET_REPO_URL:-}
      HOSTLET_ALLOWED_WEB_ORIGINS: ${HOSTLET_ALLOWED_WEB_ORIGINS:-}
      HOSTLET_BASE_DOMAIN: ${HOSTLET_BASE_DOMAIN:-}
      HOSTLET_DOMAIN_PREFIX: ${HOSTLET_DOMAIN_PREFIX:-hostlet-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-}
      CLOUDFLARE_TUNNEL_TARGET: ${CLOUDFLARE_TUNNEL_TARGET:-}
      HOSTLET_ALLOW_INSECURE_DEV_DEFAULTS: "false"
      HOSTLET_SETUP_TOKEN: ${HOSTLET_SETUP_TOKEN}
      HOSTLET_ALLOWED_GITHUB_LOGINS: ${HOSTLET_ALLOWED_GITHUB_LOGINS}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JOB_SIGNING_SECRET: ${JOB_SIGNING_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      LOCAL_SERVER_ID: 00000000-0000-0000-0000-000000000001
      LOCAL_AGENT_TOKEN: ${LOCAL_AGENT_TOKEN}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - postgres

  local-agent:
    build:
      context: ..
      dockerfile: apps/agent/Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      HOSTLET_API_URL: http://127.0.0.1:8080
      HOSTLET_SERVER_ID: 00000000-0000-0000-0000-000000000001
      HOSTLET_AGENT_TOKEN: ${LOCAL_AGENT_TOKEN}
      HOSTLET_JOB_SIGNING_SECRET: ${JOB_SIGNING_SECRET}
      HOSTLET_WORKDIR: /var/lib/hostlet
      HOSTLET_LOCAL_MODE: "true"
      HOSTLET_HEALTH_HOST: 127.0.0.1
      HOSTLET_LOCAL_ROUTER: caddy
      HOSTLET_LOCAL_ROUTER_SNIPPETS_DIR: /var/lib/hostlet/caddy
      HOSTLET_LOCAL_ROUTER_RELOAD: docker exec hostlet-caddy caddy reload --config /etc/caddy/Caddyfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - hostlet-agent:/var/lib/hostlet
    depends_on:
      - api
      - caddy

  caddy:
    image: caddy:2-alpine
    container_name: hostlet-caddy
    restart: unless-stopped
    network_mode: host
    command: caddy run --config /etc/caddy/Caddyfile
    environment:
      HOSTLET_CONTROL_PLANE_HOST: ${HOSTLET_CONTROL_PLANE_HOST:-localhost}
    volumes:
      - ./Caddyfile.tunnel:/etc/caddy/Caddyfile:ro
      - hostlet-agent:/var/lib/hostlet

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - caddy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
      NEXT_PUBLIC_WEBHOOK_URL: ${PUBLIC_WEBHOOK_URL:-}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

volumes:
  hostlet-postgres:
  hostlet-agent:
