services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hostlet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Run hostlet init first}
      POSTGRES_DB: ${POSTGRES_DB:-hostlet}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - hostlet-postgres:/var/lib/postgresql/data

  api:
    image: rust:latest
    working_dir: /repo
    command: bash -lc "/usr/local/cargo/bin/cargo run --manifest-path apps/api/Cargo.toml"
    environment:
      HOSTLET_IMAGE_TAG: ${HOSTLET_IMAGE_TAG:-dev}
      HOSTLET_IMAGE_REGISTRY: ${HOSTLET_IMAGE_REGISTRY:-local}
      DATABASE_URL: postgres://${POSTGRES_USER:-hostlet}:${POSTGRES_PASSWORD:?Run hostlet init first}@postgres:5432/${POSTGRES_DB:-hostlet}
      BIND_ADDR: 0.0.0.0:8080
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
      PUBLIC_WEBHOOK_URL: ${PUBLIC_WEBHOOK_URL:-}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-http://localhost:3000}
      HOSTLET_CONTROL_PLANE_HOST: ${HOSTLET_CONTROL_PLANE_HOST:-localhost}
      HOSTLET_ALLOWED_WEB_ORIGINS: ${HOSTLET_ALLOWED_WEB_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      HOSTLET_BASE_DOMAIN: ${HOSTLET_BASE_DOMAIN:-}
      HOSTLET_DOMAIN_PREFIX: ${HOSTLET_DOMAIN_PREFIX:-hostlet-}
      HOSTLET_PRIVATE_APP_HOST: ${HOSTLET_PRIVATE_APP_HOST:-127.0.0.1}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-}
      CLOUDFLARE_TUNNEL_TARGET: ${CLOUDFLARE_TUNNEL_TARGET:-}
      HOSTLET_ALLOW_INSECURE_DEV_DEFAULTS: ${HOSTLET_ALLOW_INSECURE_DEV_DEFAULTS:-false}
      HOSTLET_SETUP_TOKEN: ${HOSTLET_SETUP_TOKEN:?Run hostlet init first}
      HOSTLET_ALLOWED_GITHUB_LOGINS: ${HOSTLET_ALLOWED_GITHUB_LOGINS:?Run hostlet init first}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Run hostlet init first}
      JOB_SIGNING_SECRET: ${JOB_SIGNING_SECRET:?Run hostlet init first}
      SESSION_SECRET: ${SESSION_SECRET:?Run hostlet init first}
      LOCAL_SERVER_ID: 00000000-0000-0000-0000-000000000001
      LOCAL_AGENT_TOKEN: ${LOCAL_AGENT_TOKEN:?Run hostlet init first}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?Run hostlet init first}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    ports:
      - "8080:8080"
    volumes:
      - ..:/repo
    depends_on:
      - postgres

  local-agent:
    image: rust:latest
    working_dir: /repo
    network_mode: host
    command: bash -lc "apt-get update && apt-get install -y docker.io git && /usr/local/cargo/bin/cargo run --manifest-path apps/agent/Cargo.toml"
    environment:
      HOSTLET_API_URL: http://127.0.0.1:8080
      HOSTLET_SERVER_ID: 00000000-0000-0000-0000-000000000001
      HOSTLET_AGENT_TOKEN: ${LOCAL_AGENT_TOKEN:?Run hostlet init first}
      HOSTLET_JOB_SIGNING_SECRET: ${JOB_SIGNING_SECRET:?Run hostlet init first}
      HOSTLET_WORKDIR: /var/lib/hostlet
      HOSTLET_LOCAL_MODE: "true"
      HOSTLET_HEALTH_HOST: 127.0.0.1
      HOSTLET_LOCAL_ROUTER: caddy
      HOSTLET_LOCAL_ROUTER_SNIPPETS_DIR: /var/lib/hostlet/caddy
      HOSTLET_LOCAL_ROUTER_RELOAD: docker exec hostlet-caddy caddy reload --config /etc/caddy/Caddyfile
    volumes:
      - ..:/repo
      - /var/run/docker.sock:/var/run/docker.sock
      - hostlet-agent:/var/lib/hostlet
    depends_on:
      - api
      - caddy

  caddy:
    image: caddy:2-alpine
    container_name: hostlet-caddy
    network_mode: host
    command: caddy run --config /etc/caddy/Caddyfile
    environment:
      HOSTLET_CONTROL_PLANE_HOST: ${HOSTLET_CONTROL_PLANE_HOST:-localhost}
      HOSTLET_APPS_HOST: ${HOSTLET_BASE_DOMAIN:-localhost}
    volumes:
      - ${HOSTLET_CADDYFILE:-./Caddyfile.tunnel}:/etc/caddy/Caddyfile:ro
      - hostlet-agent:/var/lib/hostlet

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    network_mode: host
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: unless-stopped
    depends_on:
      - caddy

  web:
    image: node:22-alpine
    working_dir: /repo/apps/web
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile --config.confirm-modules-purge=false && pnpm dev --hostname 0.0.0.0"
    environment:
      CI: "true"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_WEBHOOK_URL: ${PUBLIC_WEBHOOK_URL:-}
      NEXT_ALLOWED_DEV_ORIGINS: ${NEXT_ALLOWED_DEV_ORIGINS:-10.0.0.194}
    ports:
      - "3000:3000"
    volumes:
      - ..:/repo
    depends_on:
      - api

volumes:
  hostlet-postgres:
  hostlet-agent:
